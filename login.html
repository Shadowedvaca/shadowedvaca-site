<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Shadowedvaca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0a0c10;
      --bg-card: #0f1219;
      --border: #1e2533;
      --text-primary: #c8cdd3;
      --text-secondary: #6b7280;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.15);
      --danger: #e74c3c;
      --danger-dim: rgba(231, 76, 60, 0.1);
      --success: #2ecc71;
      --success-dim: rgba(46, 204, 113, 0.1);
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .brand {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #070909;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .alert {
      display: none;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }

    .alert-error {
      background: var(--danger-dim);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">shadowedvaca.com</div>
    <h1>Sign In</h1>
    <p class="subtitle">Restricted access</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>

      <div class="alert alert-error" id="loginError">Invalid username or password</div>

      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="footer">
      Have an invite code? <a href="/register.html">Create account →</a>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'sv_site_jwt';

    (function () {
      var data = getSession();
      if (data) {
        var next = new URLSearchParams(location.search).get('next') || '/hub/';
        location.href = next;
      }
    })();

    function getSession() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        var data = JSON.parse(raw);
        if (!data.token) return null;
        var parts = data.token.split('.');
        if (parts.length !== 3) return null;
        var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/hub/')));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
          localStorage.removeItem(STORAGE_KEY);
          return null;
        }
        return data;
      } catch (e) { return null; }
    }

    async function handleLogin(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var errorEl = document.getElementById('loginError');
      var submitBtn = document.getElementById('submitBtn');

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        var resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });

        if (!resp.ok) {
          errorEl.textContent = 'Invalid username or password';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          return;
        }

        var data = await resp.json();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          token: data.token,
          username: data.username,
          isAdmin: data.isAdmin || false
        }));

        var next = new URLSearchParams(location.search).get('next') || '/hub/';
        location.href = next;

      } catch (err) {
        errorEl.textContent = 'Connection error — check your network';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
