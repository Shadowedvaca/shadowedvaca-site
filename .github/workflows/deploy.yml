name: Deploy → Prod

on:
  push:
    tags:
      - 'prod-v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python packages/site/build.py

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.PROD_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static files
        env:
          HOST: ${{ secrets.PROD_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            dist/. root@$HOST:/var/www/shadowedvaca.com/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            login.html register.html root@$HOST:/var/www/shadowedvaca.com/

      - name: Rebuild and restart prod app container
        env:
          HOST: ${{ secrets.PROD_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@$HOST bash << 'ENDSSH'
            set -e
            cd /opt/shadowedvaca-site
            git fetch --tags --force --prune origin
            git checkout ${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml build app
            docker compose -f docker-compose.prod.yml up -d app
            docker image prune -f
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl --fail https://shadowedvaca.com/api/health
