name: Deploy → Dev

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python packages/site/build.py

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEV_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static files
        env:
          HOST: ${{ secrets.DEV_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            dist/. root@$HOST:/var/www/dev.shadowedvaca.com/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            login.html register.html root@$HOST:/var/www/dev.shadowedvaca.com/

      - name: Rebuild and restart dev app container
        env:
          HOST: ${{ secrets.DEV_HOST }}
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@$HOST bash << ENDSSH
            set -e
            cd /opt/shadowedvaca-site
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
            docker compose -f docker-compose.dev.yml build app
            docker compose -f docker-compose.dev.yml up -d app
            docker image prune -f
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl --fail https://dev.shadowedvaca.com/api/health
