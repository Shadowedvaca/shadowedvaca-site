<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub — Shadowedvaca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:        #0a0c10;
      --bg-card:        #0d1117;
      --bg-card-hover:  #111620;
      --divider:        #1e2533;
      --text-primary:   #c8cdd3;
      --text-secondary: #6b7280;
      --cyan:           #00d4ff;
      --green-bright:   #33ff33;
      --green-dim:      #1a9e1a;
      --amber:          #f0a030;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }

    .hub-header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 2.5rem;
    }

    .prompt-line {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--green-dim);
      margin-bottom: 0.4rem;
    }

    .prompt-line .prompt-user { color: var(--green-bright); }
    .prompt-line .prompt-cmd  { color: var(--text-secondary); }

    .hub-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      color: var(--cyan);
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }

    .hub-user {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'Share Tech Mono', monospace;
    }

    .hub-user span { color: var(--amber); }

    .section-divider {
      width: 100%;
      max-width: 680px;
      border: none;
      border-top: 1px solid var(--divider);
      margin: 0 0 2rem;
    }

    .section-label {
      width: 100%;
      max-width: 680px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
    }

    .tool-grid {
      width: 100%;
      max-width: 680px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .tool-card {
      display: block;
      background: var(--bg-card);
      border: 1px solid var(--divider);
      border-left: 3px solid transparent;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: border-left-color 0.15s, background 0.15s;
    }

    .tool-card:hover {
      border-left-color: var(--cyan);
      background: var(--bg-card-hover);
      text-decoration: none;
    }

    .tool-card.admin-card:hover { border-left-color: var(--amber); }

    .tool-card-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }

    .tool-card.admin-card .tool-card-label { color: var(--amber); opacity: 0.7; }

    .tool-card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .tool-card-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .hub-footer {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 1rem;
    }

    .hub-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .hub-footer a:hover { color: var(--cyan); }

    .logout-btn {
      background: none;
      border: 1px solid var(--divider);
      border-radius: 3px;
      padding: 4px 10px;
      color: var(--text-secondary);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .logout-btn:hover { color: var(--amber); border-color: var(--amber); }
  </style>
</head>
<body>

  <div class="hub-header">
    <div class="prompt-line">
      <span class="prompt-user">shadowedvaca@cmd</span><span class="prompt-cmd">:~$ ls --tools</span>
    </div>
    <div class="hub-title">tools &amp; systems</div>
    <div class="hub-user">logged in as <span id="usernameDisplay">...</span></div>
  </div>

  <hr class="section-divider">

  <div class="section-label" id="toolsLabel" style="display:none">tools</div>
  <div class="tool-grid" id="toolGrid"></div>

  <div class="section-label" id="adminLabel" style="display:none">admin</div>
  <div class="tool-grid" id="adminGrid"></div>

  <div class="hub-footer">
    <a href="/">← back to site</a>
    <button class="logout-btn" onclick="logout()">[ logout ]</button>
  </div>

  <script>
    var STORAGE_KEY = 'sv_site_jwt';

    // Tools visible to all users (controlled by permissions)
    var ALL_TOOLS = [
      { slug: 'settings', name: 'Settings', label: 'account', desc: 'Password and account preferences', path: '/hub/settings/', locked: true },
      { slug: 'ideas', name: 'Ideation Board', label: 'tools', desc: 'Browse and search project ideas — spark to ship', path: '/ideas/' },
    ];

    // Admin-only tools (not permission-controlled)
    var ADMIN_TOOLS = [
      { slug: 'invite',            name: 'Invite',            label: 'admin', desc: 'Invite someone and choose what they can see', path: '/hub/invite/' },
      { slug: 'users',             name: 'Users',             label: 'admin', desc: 'Manage user access to hub tools', path: '/hub/users/' },
      { slug: 'customer_feedback', name: 'Customer Feedback', label: 'admin', desc: 'Review feedback submitted across all apps.', path: '/hub/feedback/' },
    ];

    function getSession() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        var data = JSON.parse(raw);
        if (!data || !data.token) return null;
        var parts = data.token.split('.');
        if (parts.length !== 3) return null;
        var payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
          localStorage.removeItem(STORAGE_KEY);
          return null;
        }
        return data;
      } catch (e) { return null; }
    }

    function logout() {
      localStorage.removeItem(STORAGE_KEY);
      location.href = '/';
    }

    function makeCard(tool, isAdmin) {
      var a = document.createElement('a');
      a.href = tool.path;
      a.className = 'tool-card' + (isAdmin ? ' admin-card' : '');
      a.innerHTML =
        '<div class="tool-card-label">' + tool.label + '</div>' +
        '<div class="tool-card-name">' + tool.name + '</div>' +
        '<div class="tool-card-desc">' + tool.desc + '</div>';
      return a;
    }

    async function init() {
      var session = getSession();
      if (!session) {
        location.href = '/login.html?next=' + encodeURIComponent(location.pathname);
        return;
      }

      document.getElementById('usernameDisplay').textContent = session.username || 'user';

      // Fetch full profile including permissions
      var me;
      try {
        var resp = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + session.token }
        });
        if (!resp.ok) { logout(); return; }
        me = await resp.json();
      } catch (e) { return; }

      var permissions = me.permissions || [];
      var isAdmin = me.isAdmin || false;

      // Render user tools
      var toolGrid = document.getElementById('toolGrid');
      var toolsLabel = document.getElementById('toolsLabel');
      var shown = 0;
      ALL_TOOLS.forEach(function(tool) {
        if (isAdmin || tool.locked || permissions.indexOf(tool.slug) !== -1) {
          toolGrid.appendChild(makeCard(tool, false));
          shown++;
        }
      });
      if (shown > 0) toolsLabel.style.display = '';

      // Render admin tools
      if (isAdmin) {
        var adminGrid = document.getElementById('adminGrid');
        document.getElementById('adminLabel').style.display = '';
        ADMIN_TOOLS.forEach(function(tool) {
          adminGrid.appendChild(makeCard(tool, true));
        });
      }
    }

    init();
  </script>
</body>
</html>
