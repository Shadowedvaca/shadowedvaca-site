server {
    server_name shadowedvaca.com www.shadowedvaca.com;

    root /var/www/shadowedvaca.com;
    index index.html;
    error_page 404 /404.html;

    # API proxy to sv_site FastAPI (port 8050)
    location /api/ {
        # TODO Phase F.D.4: Change to http://127.0.0.1:8055 when Docker prod container is live
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA-friendly fallback for ideas board
    location /ideas/ {
        try_files $uri $uri/ =404;
    }

    # Serve static files, 404 on miss
    location / {
        try_files $uri $uri/ =404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|zip)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shadowedvaca.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shadowedvaca.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.shadowedvaca.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = shadowedvaca.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name shadowedvaca.com www.shadowedvaca.com;
    return 404; # managed by Certbot
}
