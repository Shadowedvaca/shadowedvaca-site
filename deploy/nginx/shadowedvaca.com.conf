server {
    listen 80;
    server_name shadowedvaca.com www.shadowedvaca.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shadowedvaca.com www.shadowedvaca.com;

    ssl_certificate /etc/letsencrypt/live/shadowedvaca.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shadowedvaca.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/shadowedvaca.com;
    index index.html;

    # API proxy to sv_site FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA-friendly fallback for the ideas board
    location /ideas/ {
        try_files $uri $uri/ /ideas/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
